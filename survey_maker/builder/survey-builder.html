// ---------------------------------------------------------------------------
// Grid editor
// ---------------------------------------------------------------------------

function gridEditor(q) {
  const section = el("div", "field-group");
  const title = el("div", "section-title");
  title.textContent = "Grid rows" + (HAS_COLS.has(q.type) ? " & columns" : "");
  section.appendChild(title);

  const gridWrap = el("div", "grid-editor");

  // Rows
  const rowsCol = el("div", "grid-editor-col");
  const rowsTitle = el("div", "section-title");
  rowsTitle.textContent = "Rows";
  rowsCol.appendChild(rowsTitle);

  const rowsList = el("div");
  const renderRows = () => {
    rowsList.innerHTML = "";
    (q.rows || []).forEach((row, i) => {
      const entry = el("div", "grid-row-entry");

      const textI = document.createElement("input");
      textI.type = "text"; textI.placeholder = "Row text";
      textI.value = row.text || "";
      textI.addEventListener("input", () => { row.text = textI.value; });

      const labelKey = q.type === "checkbox_grid" ? "label_prefix" : "label";
      const labelI = document.createElement("input");
      labelI.type = "text";
      labelI.placeholder = q.type === "checkbox_grid" ? "prefix" : "label";
      labelI.className = "mono-input";
      labelI.value = row[labelKey] || "";
      labelI.addEventListener("input", () => { row[labelKey] = labelI.value; });

      const condBtn = el("span", "option-has-condition");
      condBtn.textContent = row.display_if ? "if ✓" : "if";
      condBtn.title = "Edit row condition";
      condBtn.addEventListener("click", () => {
        const availQ = questionsBefore(selected.pageId, q.id);
        const modal = document.getElementById("modal-description");
        modal.querySelector("h3").textContent = "Row display condition";
        const body = modal.querySelector(".field-group");
        body.innerHTML = "";
        body.appendChild(conditionSection("Show this row conditionally", row, availQ, () => {
          condBtn.textContent = row.display_if ? "if ✓" : "if";
        }));
        modal.querySelector(".modal-actions").innerHTML = `<button class="btn btn-primary" id="modal-row-cond-done">Done</button>`;
        document.getElementById("modal-row-cond-done").onclick = () => closeModal("modal-description");
        openModal("modal-description");
      });

      const upBtn = el("button","btn btn-icon"); upBtn.textContent = "↑";
      upBtn.addEventListener("click", () => {
        if (i > 0) { [q.rows[i-1], q.rows[i]] = [q.rows[i], q.rows[i-1]]; renderRows(); }
      });
      const delBtn = el("button","btn btn-icon"); delBtn.textContent = "✕";
      delBtn.style.color = "var(--red)";
      delBtn.addEventListener("click", () => { q.rows.splice(i,1); renderRows(); });

      entry.appendChild(textI);
      entry.appendChild(labelI);
      entry.appendChild(condBtn);
      entry.appendChild(upBtn);
      entry.appendChild(delBtn);
      rowsList.appendChild(entry);
    });
  };
  renderRows();
  rowsCol.appendChild(rowsList);

  const addRowBtn = el("button","btn btn-ghost btn-sm");
  addRowBtn.textContent = "+ Add row";
  addRowBtn.addEventListener("click", () => { q.rows.push(newRow(q.type)); renderRows(); });
  rowsCol.appendChild(addRowBtn);
  gridWrap.appendChild(rowsCol);

  // Columns (only for radio_grid and checkbox_grid)
  if (HAS_COLS.has(q.type)) {
    const colsCol = el("div", "grid-editor-col");
    const colsTitle = el("div", "section-title");
    colsTitle.textContent = "Columns";
    colsCol.appendChild(colsTitle);

    const colsList = el("div");
    const renderCols = () => {
      colsList.innerHTML = "";
      (q.columns || []).forEach((col, i) => {
        const entry = el("div", "grid-row-entry");

        const textI = document.createElement("input");
        textI.type = "text"; textI.placeholder = "Column text";
        textI.value = col.text || "";
        textI.addEventListener("input", () => { col.text = textI.value; });

        const valI = document.createElement("input");
        valI.type = "text"; valI.placeholder = "value";
        valI.className = "mono-input";
        valI.value = col.value || "";
        valI.addEventListener("input", () => { col.value = valI.value; });

        const upBtn = el("button","btn btn-icon"); upBtn.textContent = "↑";
        upBtn.addEventListener("click", () => {
          if (i > 0) { [q.columns[i-1], q.columns[i]] = [q.columns[i], q.columns[i-1]]; renderCols(); }
        });
        const delBtn = el("button","btn btn-icon"); delBtn.textContent = "✕";
        delBtn.style.color = "var(--red)";
        delBtn.addEventListener("click", () => { q.columns.splice(i,1); renderCols(); });

        entry.appendChild(textI);
        entry.appendChild(valI);
        entry.appendChild(upBtn);
        entry.appendChild(delBtn);
        colsList.appendChild(entry);
      });
    };
    renderCols();
    colsCol.appendChild(colsList);

    const addColBtn = el("button","btn btn-ghost btn-sm");
    addColBtn.textContent = "+ Add column";
    addColBtn.addEventListener("click", () => { q.columns.push(newCol()); renderCols(); });
    colsCol.appendChild(addColBtn);
    gridWrap.appendChild(colsCol);
  }

  section.appendChild(gridWrap);
  return section;
}

// ---------------------------------------------------------------------------
// Variable editor
// ---------------------------------------------------------------------------

function getAvailableVariables(pageId, questionId) {
  const vars = [];
  for (const page of allPages()) {
    for (const q of page.questions) {
      if (q.id === questionId && page.id === pageId) return vars;
      if (q.defines_variable && q.defines_variable.name) {
        vars.push(q.defines_variable.name);
      }
    }
    if (page.id === pageId) return vars;
  }
  return vars;
}

function variableEditor(q) {
  const section = el("div");
  const title = el("div", "section-title");
  title.textContent = "Define variable from answer";
  section.appendChild(title);

  const hintEl = el("div", "field-hint");
  hintEl.style.marginTop = "0";
  hintEl.style.marginBottom = "0.75rem";
  hintEl.textContent = "Makes this question's answer available as {variable_name} in later text, and as $variable_name in display_if conditions.";
  section.appendChild(hintEl);

  const hasVar = !!q.defines_variable;

  // Toggle
  const toggleWrap = el("div", "field-group");
  const toggleLabel = el("label", "checkbox-row");
  const toggleCb = document.createElement("input");
  toggleCb.type = "checkbox";
  toggleCb.checked = hasVar;
  toggleCb.addEventListener("change", () => {
    if (toggleCb.checked) {
      q.defines_variable = { name: "", mapping: null };
    } else {
      q.defines_variable = null;
    }
    renderEditor();
  });
  toggleLabel.appendChild(toggleCb);
  toggleLabel.appendChild(span("This question defines a variable"));
  toggleWrap.appendChild(toggleLabel);
  section.appendChild(toggleWrap);

  if (!hasVar) return section;

  const v = q.defines_variable;

  // Variable name
  const nameField = field("Variable name", textInput(v.name || "", val => { v.name = val; }));
  nameField.appendChild(hint("Use letters, digits, and underscores. Referenced as {name} in text."));
  section.appendChild(nameField);

  // Mapping toggle
  const hasMappingCb = document.createElement("input");
  hasMappingCb.type = "checkbox";
  hasMappingCb.checked = v.mapping !== null && v.mapping !== undefined;
  const mappingToggle = el("div", "field-group");
  const mappingToggleLabel = el("label", "checkbox-row");
  hasMappingCb.addEventListener("change", () => {
    if (hasMappingCb.checked) {
      // Pre-fill mapping from options if available
      const m = {};
      if (q.options && q.options.length) {
        q.options.forEach(o => { if (o.value) m[o.value] = o.text || o.value; });
      }
      v.mapping = m;
    } else {
      v.mapping = null;
    }
    renderEditor();
  });
  mappingToggleLabel.appendChild(hasMappingCb);
  mappingToggleLabel.appendChild(span("Custom mapping (otherwise uses raw answer value)"));
  mappingToggle.appendChild(mappingToggleLabel);
  section.appendChild(mappingToggle);

  // Mapping entries
  if (v.mapping !== null && v.mapping !== undefined) {
    const mapWrap = el("div", "condition-wrap");
    const mapTitle = el("div", "field-hint");
    mapTitle.style.marginBottom = "0.5rem";
    mapTitle.textContent = "Answer value → display text";
    mapWrap.appendChild(mapTitle);

    const entries = Object.entries(v.mapping);
    const entriesList = el("div", "options-editor");

    const renderEntries = () => {
      entriesList.innerHTML = "";
      Object.entries(v.mapping).forEach(([key, val]) => {
        const row = el("div", "option-row");
        const keyI = document.createElement("input");
        keyI.type = "text"; keyI.placeholder = "answer value";
        keyI.className = "mono-input"; keyI.style.maxWidth = "140px";
        keyI.value = key;
        const sep = el("span", "option-row-sep"); sep.textContent = "→";
        const valI = document.createElement("input");
        valI.type = "text"; valI.placeholder = "display text";
        valI.value = val;
        valI.style.flex = "1";

        keyI.addEventListener("input", () => {
          // Rename the key
          const newMapping = {};
          Object.entries(v.mapping).forEach(([k, v2]) => {
            newMapping[k === key ? keyI.value : k] = v2;
          });
          v.mapping = newMapping;
        });
        valI.addEventListener("input", () => { v.mapping[keyI.value] = valI.value; });

        const delBtn = el("button", "btn btn-icon");
        delBtn.textContent = "✕"; delBtn.style.color = "var(--red)";
        delBtn.addEventListener("click", () => { delete v.mapping[key]; renderEntries(); });

        row.appendChild(keyI);
        row.appendChild(sep);
        row.appendChild(valI);
        row.appendChild(delBtn);
        entriesList.appendChild(row);
      });
    };
    renderEntries();
    mapWrap.appendChild(entriesList);

    const addEntryBtn = el("button", "btn btn-ghost btn-sm");
    addEntryBtn.textContent = "+ Add mapping";
    addEntryBtn.addEventListener("click", () => { v.mapping[""] = ""; renderEntries(); });
    mapWrap.appendChild(addEntryBtn);

    // Auto-fill button if question has options
    if (q.options && q.options.length) {
      const autoBtn = el("button", "btn btn-ghost btn-sm");
      autoBtn.textContent = "Auto-fill from options";
      autoBtn.style.marginLeft = "0.5rem";
      autoBtn.addEventListener("click", () => {
        q.options.forEach(o => { if (o.value) v.mapping[o.value] = o.text || o.value; });
        renderEntries();
      });
      mapWrap.appendChild(autoBtn);
    }

    section.appendChild(mapWrap);
  }

  return section;
}

// ---------------------------------------------------------------------------
// Condition clipboard (for copy/paste of conditions)
// ---------------------------------------------------------------------------

let _conditionClipboard = null;

function copyCondition(cond) {
  _conditionClipboard = JSON.parse(JSON.stringify(cond));
  showToast("Condition copied");
}

function pasteCondition() {
  if (!_conditionClipboard) return null;
  return JSON.parse(JSON.stringify(_conditionClipboard));
}

// ---------------------------------------------------------------------------
// Condition builder
// ---------------------------------------------------------------------------

function conditionSection(titleText, target, availableQuestions, onChange) {
  const wrap = el("div");
  const secTitle = el("div", "section-title");
  secTitle.textContent = titleText;
  wrap.appendChild(secTitle);

  const condWrap = el("div", "condition-wrap");
  wrap.appendChild(condWrap);

  const toggleRow = el("div", "condition-toggle");
  const lblAlways = document.createElement("label");
  const rbAlways = document.createElement("input");
  rbAlways.type = "radio"; rbAlways.name = "cond_" + target.id;
  rbAlways.value = "always"; rbAlways.checked = !target.display_if;
  lblAlways.appendChild(rbAlways); lblAlways.appendChild(span(" Always show"));

  const lblCond = document.createElement("label");
  const rbCond = document.createElement("input");
  rbCond.type = "radio"; rbCond.name = "cond_" + target.id;
  rbCond.value = "conditional"; rbCond.checked = !!target.display_if;
  lblCond.appendChild(rbCond); lblCond.appendChild(span(" Show conditionally"));

  toggleRow.appendChild(lblAlways);
  toggleRow.appendChild(lblCond);
  condWrap.appendChild(toggleRow);

  const builderWrap = el("div");
  builderWrap.style.display = target.display_if ? "" : "none";
  condWrap.appendChild(builderWrap);

  const rebuildBuilder = () => {
    builderWrap.innerHTML = "";
    if (!target.display_if) return;

    const toolbar = el("div", "cond-toolbar");
    const copyBtn = el("button", "btn btn-ghost btn-sm");
    copyBtn.textContent = "\u29C9 Copy all";
    copyBtn.addEventListener("click", () => copyCondition(target.display_if));

    const pasteBtn = el("button", "btn btn-ghost btn-sm");
    pasteBtn.textContent = "\uD83D\uDCCB Paste" + (_conditionClipboard ? "" : " (empty)");
    pasteBtn.disabled = !_conditionClipboard;
    pasteBtn.addEventListener("click", () => {
      const pasted = pasteCondition();
      if (pasted) { target.display_if = pasted; rebuildBuilder(); onChange && onChange(); }
    });

    toolbar.appendChild(copyBtn);
    toolbar.appendChild(pasteBtn);
    builderWrap.appendChild(toolbar);

    builderWrap.appendChild(renderConditionNode(target.display_if, availableQuestions, () => {
      onChange && onChange();
    }, (newCond) => {
      target.display_if = newCond;
      rebuildBuilder();
      onChange && onChange();
    }));

    // If the root node is NOT a group (and/or), show an "+ Add condition" button
    // that wraps the current root in an AND group with a new empty sibling
    const rootOp = target.display_if && target.display_if.operator;
    if (rootOp !== "and" && rootOp !== "or") {
      const addBtn = el("button", "btn btn-ghost btn-sm");
      addBtn.textContent = "+ Add condition";
      addBtn.style.marginTop = "0.35rem";
      addBtn.addEventListener("click", () => {
        target.display_if = {
          operator: "and",
          conditions: [
            JSON.parse(JSON.stringify(target.display_if)),
            { question: "", operator: "equals", value: "" }
          ]
        };
        rebuildBuilder();
        onChange && onChange();
      });
      builderWrap.appendChild(addBtn);
    }
  };

  rbAlways.addEventListener("change", () => {
    if (rbAlways.checked) {
      target.display_if = null;
      builderWrap.style.display = "none";
      builderWrap.innerHTML = "";
      onChange && onChange();
    }
  });

  rbCond.addEventListener("change", () => {
    if (rbCond.checked) {
      builderWrap.style.display = "";
      if (!target.display_if) {
        if (_conditionClipboard) {
          target.display_if = pasteCondition();
        } else {
          target.display_if = { question: "", operator: "equals", value: "" };
        }
      }
      rebuildBuilder();
      onChange && onChange();
    }
  });

  if (target.display_if) rebuildBuilder();
  return wrap;
}

function renderConditionNode(node, availQ, onChange, onReplace) {
  if (!node) return el("div");
  if (node.operator === "and" || node.operator === "or") return renderConditionGroup(node, availQ, onChange, onReplace);
  if (node.operator === "not") return renderConditionNot(node, availQ, onChange, onReplace);
  return renderConditionLeaf(node, availQ, onChange, onReplace);
}

function renderConditionLeaf(node, availQ, onChange, onReplace) {
  const wrap = el("div", "condition-builder");
  const leafRow = el("div", "condition-leaf");

  const qSel = document.createElement("select");
  qSel.className = "q-select";
  const blankOpt = document.createElement("option");
  blankOpt.value = ""; blankOpt.textContent = "\u2014 pick question \u2014";
  qSel.appendChild(blankOpt);

  let currentGroup = null;
  availQ.forEach(q => {
    const isSubItem = q.type.endsWith("_row") || q.type === "number_grid_cell";
    if (isSubItem && q._parentId) {
      if (!currentGroup || currentGroup.dataset.parentId !== q._parentId) {
        currentGroup = document.createElement("optgroup");
        currentGroup.label = "\u21B3 " + (q.type === "number_grid_cell" ? "cells" : "rows") + " of: " + (q._parentText || q._parentId).slice(0,35);
        currentGroup.dataset.parentId = q._parentId;
        qSel.appendChild(currentGroup);
      }
      const o = document.createElement("option");
      o.value = q.id;
      o.textContent = (q.label || q.id) + " \u2014 " + (q.text || "").slice(0,30);
      if (q.id === node.question) o.selected = true;
      currentGroup.appendChild(o);
    } else {
      currentGroup = null;
      const o = document.createElement("option");
      o.value = q.id;
      o.textContent = (q.label || q.id) + (q.text ? " \u2014 " + q.text.slice(0,30) : "");
      if (q.id === node.question) o.selected = true;
      qSel.appendChild(o);
    }
  });

  // Add variable entries — collect all variables defined by questions in availQ
  const varNames = new Set();
  for (const page of allPages()) {
    for (const q of page.questions) {
      if (q.defines_variable && q.defines_variable.name) {
        // Only include if the defining question is in availQ (respects ordering)
        if (availQ.some(aq => aq.id === q.id)) {
          varNames.add(q.defines_variable.name);
        }
      }
    }
  }
  if (varNames.size > 0) {
    const varGroup = document.createElement("optgroup");
    varGroup.label = "\u{1F4CC} Variables";
    for (const vn of [...varNames].sort()) {
      const o = document.createElement("option");
      o.value = "$" + vn;
      o.textContent = "$" + vn;
      if (("$" + vn) === node.question) o.selected = true;
      varGroup.appendChild(o);
    }
    qSel.appendChild(varGroup);
  }

  const opSel = document.createElement("select");
  opSel.className = "op-select";
  const rebuildOps = () => {
    const currentQ = availQ.find(q => q.id === qSel.value);
    const isCheckbox = currentQ && (currentQ.type === "checkbox" || currentQ.type === "checkbox_grid" || currentQ.type === "checkbox_grid_row");
    const isVar = qSel.value && qSel.value.startsWith("$");
    opSel.innerHTML = "";
    const ops = [
      ["equals","equals"], ["not_equals","not equals"],
      ...(!isVar && isCheckbox ? [["includes","includes"],["not_includes","not includes"]] : []),
      ...(!isVar && isCheckbox ? [["count_equals","count ="],["count_not_equals","count \u2260"],["count_gt","count >"],["count_gte","count \u2265"],["count_lt","count <"],["count_lte","count \u2264"]] : []),
      ["is_answered","is answered"], ["is_not_answered","is not answered"],
    ];
    ops.forEach(([val, label]) => {
      const o = document.createElement("option");
      o.value = val; o.textContent = label;
      if (val === node.operator) o.selected = true;
      opSel.appendChild(o);
    });
  };
  rebuildOps();

  const valWrap = el("span");
  const rebuildVal = () => {
    valWrap.innerHTML = "";
    const currentQ = availQ.find(q => q.id === qSel.value);
    const op = opSel.value;
    if (op === "is_answered" || op === "is_not_answered") return;
    if (op.startsWith("count_")) {
      const vInput = document.createElement("input");
      vInput.type = "number"; vInput.className = "val-input";
      vInput.placeholder = "count"; vInput.min = "0"; vInput.step = "1";
      vInput.value = node.value || "";
      vInput.addEventListener("input", () => { node.value = vInput.value; onChange(); });
      valWrap.appendChild(vInput);
      return;
    }
    let valueOptions = null;
    if (currentQ) {
      if (OPTION_TYPES.has(currentQ.type) && currentQ.options && currentQ.options.length) {
        valueOptions = currentQ.options.map(o => ({ value: o.value, text: o.text || o.value }));
      } else if (currentQ.type === "radio_grid" && currentQ.options && currentQ.options.length) {
        valueOptions = currentQ.options.map(o => ({ value: o.value, text: o.text || o.value }));
      } else if (currentQ.type === "radio_grid_row" && currentQ.columns && currentQ.columns.length) {
        valueOptions = currentQ.columns.map(c => ({ value: c.value, text: c.text || c.value }));
      } else if (currentQ.type === "checkbox_grid_row" && currentQ.columns && currentQ.columns.length) {
        valueOptions = currentQ.columns.map(c => ({ value: c.value, text: c.text || c.value }));
      } else if (currentQ.type === "rating_grid_row" && currentQ.min !== undefined && currentQ.max !== undefined) {
        const vals = [];
        for (let i = currentQ.min; i <= currentQ.max; i++) vals.push({ value: String(i), text: String(i) });
        valueOptions = vals;
      }
    }
    if (valueOptions) {
      const vSel = document.createElement("select");
      vSel.className = "val-input";
      const blank = document.createElement("option"); blank.value = ""; blank.textContent = "\u2014 value \u2014";
      vSel.appendChild(blank);
      valueOptions.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o.value; opt.textContent = o.text;
        if (o.value === node.value) opt.selected = true;
        vSel.appendChild(opt);
      });
      vSel.addEventListener("change", () => { node.value = vSel.value; onChange(); });
      valWrap.appendChild(vSel);
    } else {
      const vInput = document.createElement("input");
      vInput.type = "text"; vInput.className = "val-input";
      vInput.placeholder = "value"; vInput.value = node.value || "";
      vInput.addEventListener("input", () => { node.value = vInput.value; onChange(); });
      valWrap.appendChild(vInput);
    }
  };
  rebuildVal();

  qSel.addEventListener("change", () => { node.question = qSel.value; rebuildOps(); rebuildVal(); onChange(); });
  opSel.addEventListener("change", () => { node.operator = opSel.value; rebuildVal(); onChange(); });

  leafRow.appendChild(qSel);
  leafRow.appendChild(opSel);
  leafRow.appendChild(valWrap);

  const actions = el("span", "cond-node-actions");
  const copyBtn = el("button", "btn btn-icon"); copyBtn.textContent = "\u29C9"; copyBtn.title = "Copy";
  copyBtn.addEventListener("click", () => copyCondition(node));
  const notBtn = el("button", "btn btn-icon"); notBtn.textContent = "\u00AC"; notBtn.title = "Wrap in NOT";
  notBtn.addEventListener("click", () => { onReplace({ operator: "not", conditions: [{ ...node }] }); });
  const groupBtn = el("button", "btn btn-icon"); groupBtn.textContent = "{ }"; groupBtn.title = "Wrap in AND/OR group";
  groupBtn.addEventListener("click", () => { onReplace({ operator: "and", conditions: [{ ...node }, { question: "", operator: "equals", value: "" }] }); });
  const delBtn = el("button", "btn btn-icon"); delBtn.textContent = "\u2715"; delBtn.title = "Remove";
  delBtn.style.color = "var(--red)";
  delBtn.addEventListener("click", () => onReplace(null));
  actions.appendChild(copyBtn); actions.appendChild(notBtn); actions.appendChild(groupBtn); actions.appendChild(delBtn);
  leafRow.appendChild(actions);

  wrap.appendChild(leafRow);
  return wrap;
}

function renderConditionNot(node, availQ, onChange, onReplace) {
  const wrap = el("div", "condition-builder");
  const notBox = el("div", "condition-not");

  const header = el("div", "condition-not-header");
  const label = el("span", "condition-not-label"); label.textContent = "NOT";
  header.appendChild(label);

  const actions = el("span", "cond-node-actions");
  const copyBtn = el("button", "btn btn-icon"); copyBtn.textContent = "\u29C9"; copyBtn.title = "Copy NOT block";
  copyBtn.addEventListener("click", () => copyCondition(node));
  const unwrapBtn = el("button", "btn btn-icon"); unwrapBtn.textContent = "\u2191"; unwrapBtn.title = "Unwrap \u2014 remove NOT";
  unwrapBtn.addEventListener("click", () => { if (node.conditions.length > 0) onReplace(node.conditions[0]); });
  const delBtn = el("button", "btn btn-icon"); delBtn.textContent = "\u2715"; delBtn.title = "Remove";
  delBtn.style.color = "var(--red)";
  delBtn.addEventListener("click", () => onReplace(null));
  actions.appendChild(copyBtn); actions.appendChild(unwrapBtn); actions.appendChild(delBtn);
  header.appendChild(actions);
  notBox.appendChild(header);

  const childWrap = el("div", "condition-not-body");
  const rebuildChild = () => {
    childWrap.innerHTML = "";
    if (node.conditions.length === 0) node.conditions.push({ question: "", operator: "equals", value: "" });
    childWrap.appendChild(renderConditionNode(node.conditions[0], availQ, () => { onChange(); rebuildChild(); }, (newChild) => {
      if (newChild === null) onReplace(null);
      else { node.conditions[0] = newChild; rebuildChild(); }
      onChange();
    }));
  };
  rebuildChild();
  notBox.appendChild(childWrap);

  wrap.appendChild(notBox);
  return wrap;
}

function renderConditionGroup(node, availQ, onChange, onReplace) {
  const wrap = el("div", "condition-builder");
  const group = el("div", "condition-group");

  const header = el("div", "condition-group-header");
  const andBtn = el("button", "condition-group-op" + (node.operator === "and" ? " active-and" : ""));
  andBtn.textContent = "AND";
  andBtn.addEventListener("click", () => { node.operator = "and"; onChange(); andBtn.className = "condition-group-op active-and"; orBtn.className = "condition-group-op"; });
  const orBtn = el("button", "condition-group-op" + (node.operator === "or" ? " active-or" : ""));
  orBtn.textContent = "OR";
  orBtn.addEventListener("click", () => { node.operator = "or"; onChange(); orBtn.className = "condition-group-op active-or"; andBtn.className = "condition-group-op"; });
  header.appendChild(andBtn); header.appendChild(orBtn);

  const actions = el("span", "cond-node-actions");
  const copyBtn = el("button", "btn btn-icon"); copyBtn.textContent = "\u29C9"; copyBtn.title = "Copy group";
  copyBtn.addEventListener("click", () => copyCondition(node));
  const pasteInBtn = el("button", "btn btn-icon"); pasteInBtn.textContent = "\uD83D\uDCCB"; pasteInBtn.title = "Paste into group";
  pasteInBtn.addEventListener("click", () => { const p = pasteCondition(); if (p) { node.conditions.push(p); rebuildChildren(); onChange(); } });
  const notBtn = el("button", "btn btn-icon"); notBtn.textContent = "\u00AC"; notBtn.title = "Wrap in NOT";
  notBtn.addEventListener("click", () => { onReplace({ operator: "not", conditions: [JSON.parse(JSON.stringify(node))] }); });
  const unGroupBtn = el("button", "btn btn-icon"); unGroupBtn.textContent = "\u2191"; unGroupBtn.title = "Ungroup";
  unGroupBtn.addEventListener("click", () => { if (node.conditions.length > 0) onReplace(node.conditions[0]); });
  const delBtn = el("button", "btn btn-icon"); delBtn.textContent = "\u2715"; delBtn.title = "Remove";
  delBtn.style.color = "var(--red)";
  delBtn.addEventListener("click", () => onReplace(null));
  actions.appendChild(copyBtn); actions.appendChild(pasteInBtn); actions.appendChild(notBtn); actions.appendChild(unGroupBtn); actions.appendChild(delBtn);
  header.appendChild(actions);
  group.appendChild(header);

  const selectedIndices = new Set();
  const childrenWrap = el("div");
  const rebuildChildren = () => {
    childrenWrap.innerHTML = "";
    selectedIndices.clear();
    node.conditions.forEach((child, i) => {
      const childRow = el("div", "condition-child-row");
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.className = "cond-select-cb";
      cb.title = "Select for grouping";
      cb.addEventListener("change", () => {
        if (cb.checked) selectedIndices.add(i); else selectedIndices.delete(i);
        groupSelBtn.style.display = selectedIndices.size >= 2 ? "" : "none";
      });
      childRow.appendChild(cb);
      childRow.appendChild(renderConditionNode(child, availQ, () => { onChange(); rebuildChildren(); }, (newChild) => {
        if (newChild === null) {
          node.conditions.splice(i, 1);
          if (node.conditions.length === 0) onReplace(null);
          else if (node.conditions.length === 1) onReplace(node.conditions[0]);
          else rebuildChildren();
        } else { node.conditions[i] = newChild; rebuildChildren(); }
        onChange();
      }));
      childrenWrap.appendChild(childRow);
    });
  };
  rebuildChildren();
  group.appendChild(childrenWrap);

  const footer = el("div", "condition-group-footer");
  const addCondBtn = el("button", "btn btn-ghost btn-sm");
  addCondBtn.textContent = "+ Add condition";
  addCondBtn.addEventListener("click", () => { node.conditions.push({ question: "", operator: "equals", value: "" }); rebuildChildren(); onChange(); });
  footer.appendChild(addCondBtn);

  const groupSelBtn = el("button", "btn btn-ghost btn-sm");
  groupSelBtn.textContent = "Group selected";
  groupSelBtn.style.display = "none";
  groupSelBtn.addEventListener("click", () => {
    if (selectedIndices.size < 2) return;
    const sorted = [...selectedIndices].sort((a, b) => a - b);
    const subGroup = { operator: "and", conditions: sorted.map(i => node.conditions[i]) };
    for (let j = sorted.length - 1; j >= 0; j--) node.conditions.splice(sorted[j], 1);
    node.conditions.splice(sorted[0], 0, subGroup);
    rebuildChildren(); onChange();
  });
  footer.appendChild(groupSelBtn);

  group.appendChild(footer);
  wrap.appendChild(group);
  return wrap;
}

// ---------------------------------------------------------------------------
// YAML export
// ---------------------------------------------------------------------------

function exportYAML() {
  const errors = validateState();
  if (errors.length) {
    showToast("Fix errors before exporting:\n" + errors.slice(0,3).join("; "), true);
    return;
  }
  const yaml = buildYAML();
  const blob = new Blob([yaml], { type: "text/yaml" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = (state.title || "survey").replace(/\s+/g, "_").toLowerCase() + ".yaml";
  a.click();
  URL.revokeObjectURL(url);
  showToast("YAML exported");
}

function validateState() {
  const errors = [];
  const allIds    = new Set();

  const checkId = (id, ctx) => {
    if (!id) { errors.push(`${ctx}: missing id`); return; }
    if (allIds.has(id)) errors.push(`Duplicate id: ${id}`);
    allIds.add(id);
  };

  if (!state.title.trim()) errors.push("Survey title is required");
  if (state.page_groups.length === 0) errors.push("Survey must have at least one group");

  state.page_groups.forEach(group => {
    checkId(group.id, `group "${group.title}"`);
    if (!group.title.trim()) errors.push(`Group ${group.id}: title is required`);
    if (group.pages.length === 0) errors.push(`Group "${group.title}": must have at least one page`);
  });

  // Collect all CSV column names to check for collisions
  const csvColumns = []; // [{col, source}]

  allPages().forEach(page => {
    checkId(page.id, `page "${page.title}"`);
    if (!page.title.trim()) errors.push(`Page ${page.id}: title is required`);
    const pt = page.page_type || "standard";
    if (pt === "standard" && page.questions.length === 0) errors.push(`Page "${page.title}": must have at least one question`);
    if (pt === "breakout" && !(page.acknowledge_text || "").trim()) errors.push(`Breakout page "${page.title}": acknowledgment text is required`);

    page.questions.forEach(q => {
      checkId(q.id, `question "${q.text}"`);
      if (!q.text.trim()) errors.push(`Question ${q.id}: text is required`);

      if (LABEL_TYPES.has(q.type)) {
        if (!q.label.trim()) errors.push(`Question "${q.text || q.id}": label is required`);
      }

      if (OPTION_TYPES.has(q.type)) {
        if (!q.options || q.options.length === 0) errors.push(`Question "${q.text}": needs at least one option`);
        (q.options || []).forEach(o => {
          if (!String(o.value).trim()) errors.push(`Question "${q.text}": option missing value`);
          if (!String(o.text).trim())  errors.push(`Question "${q.text}": option missing text`);
        });
      }

      if (HAS_ROWS.has(q.type)) {
        if (!q.rows || q.rows.length === 0) errors.push(`Question "${q.text}": needs at least one row`);
        (q.rows || []).forEach(r => {
          checkId(r.id, `row in "${q.text}"`);
          const lk = q.type === "checkbox_grid" ? "label_prefix" : "label";
          if (!r[lk]) errors.push(`Row in "${q.text}": missing ${lk}`);
        });
      }

      if (HAS_COLS.has(q.type)) {
        if (!q.columns || q.columns.length === 0) errors.push(`Question "${q.text}": needs at least one column`);
        (q.columns || []).forEach(c => {
          if (!String(c.value).trim()) errors.push(`Question "${q.text}": column missing value`);
          if (!String(c.text).trim())  errors.push(`Question "${q.text}": column missing text`);
        });
      }

      if ((q.type === "rating" || q.type === "rating_grid") && (q.min === "" || q.max === "")) {
        errors.push(`Question "${q.text}": rating min and max are required`);
      }

      // Compute CSV columns this question would produce
      const src = `question "${q.text || q.id}"`;
      if (q.type === "checkbox" && q.label && q.options) {
        q.options.forEach(o => {
          if (String(o.value).trim()) csvColumns.push({ col: `${q.label}__${o.value}`, source: src });
        });
      } else if (q.type === "checkbox_grid" && q.rows && q.columns) {
        q.rows.forEach(r => {
          if (r.label_prefix) q.columns.forEach(c => {
            if (String(c.value).trim()) csvColumns.push({ col: `${r.label_prefix}__${c.value}`, source: src });
          });
        });
      } else if (q.type === "number_grid" && q.rows && q.columns) {
        q.rows.forEach(r => {
          if (r.label) q.columns.forEach(c => {
            if (String(c.value).trim()) csvColumns.push({ col: `${r.label}__${c.value}`, source: src });
          });
        });
      } else if ((q.type === "radio_grid" || q.type === "rating_grid") && q.rows) {
        q.rows.forEach(r => {
          if (r.label) csvColumns.push({ col: r.label, source: src });
        });
      } else if (LABEL_TYPES.has(q.type) && q.label) {
        csvColumns.push({ col: q.label, source: src });
      }
    });
  });

  // Check for CSV column collisions
  const seen = {};
  csvColumns.forEach(({ col, source }) => {
    if (seen[col]) {
      errors.push(`Duplicate CSV column "${col}" — appears in ${seen[col]} and ${source}`);
    } else {
      seen[col] = source;
    }
  });

  // Validate variable names are valid identifiers
  allPages().forEach(page => {
    page.questions.forEach(q => {
      if (q.defines_variable && q.defines_variable.name) {
        const name = q.defines_variable.name;
        if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(name)) {
          errors.push(`Variable "${name}" in "${q.text || q.id}": must be a valid identifier (letters, digits, underscores).`);
        }
      }
    });
  });

  return errors;
}

function buildYAML() {
  const lines = [];
  lines.push(`survey:`);
  lines.push(`  title: ${yamlStr(state.title)}`);
  if (state.description) lines.push(...yamlBlock('description', state.description, '  '));
  lines.push(`  page_groups:`);

  state.page_groups.forEach(group => {
    lines.push(``);
    lines.push(`    - id: ${group.id}`);
    lines.push(`      title: ${yamlStr(group.title)}`);
    if (group.display_if) lines.push(...indentLines(conditionYAML(group.display_if), "      "));
    lines.push(`      pages:`);

    group.pages.forEach(page => {
      lines.push(``);
      lines.push(`        - id: ${page.id}`);
      lines.push(`          title: ${yamlStr(page.title)}`);
      if (page.page_type && page.page_type !== "standard") lines.push(`          page_type: ${page.page_type}`);
      if (page.description)   lines.push(...yamlBlock('description', page.description, '          '));
      if (page.builder_notes) lines.push(...yamlBlock('builder_notes', page.builder_notes, '          '));
      if (page.display_if)    lines.push(...indentLines(conditionYAML(page.display_if), "          "));
      if (page.page_type === "breakout") {
        if (page.acknowledge_text)   lines.push(...yamlBlock('acknowledge_text', page.acknowledge_text, '          '));
        if (page.breakout_button_label && page.breakout_button_label !== "End survey") lines.push(`          breakout_button_label: ${yamlStr(page.breakout_button_label)}`);
        if (page.continue_button_label && page.continue_button_label !== "Continue")   lines.push(`          continue_button_label: ${yamlStr(page.continue_button_label)}`);
      }
      if (page.page_type !== "section_title" && page.page_type !== "breakout") {
        lines.push(`          questions:`);
      } else if (page.questions.length > 0) {
        lines.push(`          questions:`);
      }

      page.questions.forEach(q => {
        lines.push(``);
        lines.push(`            - id: ${q.id}`);
        if (LABEL_TYPES.has(q.type)) lines.push(`              label: ${q.label}`);
        lines.push(`              type: ${q.type}`);
        lines.push(`              text: ${yamlStr(q.text)}`);
        if (q.disabled) lines.push(`              disabled: true`);
        if (q.layout)   lines.push(`              layout: ${q.layout}`);
        if (q.required) lines.push(`              required: true`);
        if (q.notes)    lines.push(...yamlBlock('notes', q.notes, '              '));
        if (q.notes && q.note_title !== "Note") lines.push(...yamlBlock('note_title', q.note_title || "", '              '));
        if (q.note_position && q.note_position !== "side") lines.push(`              note_position: ${q.note_position}`);
        if (q.warn_if_empty !== null && q.warn_if_empty !== undefined) {
          const quietByDefault = new Set(["checkbox", "text", "textarea", "checkbox_grid"]);
          const typeDefault = !quietByDefault.has(q.type);
          if (q.warn_if_empty !== typeDefault) lines.push(`              warn_if_empty: ${q.warn_if_empty}`);
        }
        if (q.display_if) lines.push(...indentLines(conditionYAML(q.display_if), "              "));

        if (q.defines_variable && q.defines_variable.name) {
          lines.push(`              defines_variable:`);
          lines.push(`                name: ${q.defines_variable.name}`);
          if (q.defines_variable.mapping && Object.keys(q.defines_variable.mapping).length > 0) {
            lines.push(`                mapping:`);
            Object.entries(q.defines_variable.mapping).forEach(([k, v]) => {
              lines.push(`                  ${yamlStr(String(k))}: ${yamlStr(String(v))}`);
            });
          }
        }

        if (q.type === "number") {
          if (q.min !== "" && q.min !== null && q.min !== undefined) lines.push(`              min: ${q.min}`);
          if (q.max !== "" && q.max !== null && q.max !== undefined) lines.push(`              max: ${q.max}`);
          if (q.integer_only) lines.push(`              integer_only: true`);
          if (q.default_value !== "" && q.default_value !== null && q.default_value !== undefined) lines.push(`              default_value: ${q.default_value}`);
        }

        if (q.type === "number_grid") {
          if (q.min !== "" && q.min !== null && q.min !== undefined) lines.push(`              min: ${q.min}`);
          if (q.max !== "" && q.max !== null && q.max !== undefined) lines.push(`              max: ${q.max}`);
          if (q.integer_only) lines.push(`              integer_only: true`);
          if (q.default_value !== "" && q.default_value !== null && q.default_value !== undefined) lines.push(`              default_value: ${q.default_value}`);
        }

        if (q.type === "rating" || (q.type === "rating_grid" && !HAS_ROWS.has("rating"))) {
          if (q.min !== "" && q.min !== undefined) lines.push(`              min: ${q.min}`);
          if (q.max !== "" && q.max !== undefined) lines.push(`              max: ${q.max}`);
          if (q.min_label) lines.push(`              min_label: ${yamlStr(q.min_label)}`);
          if (q.max_label) lines.push(`              max_label: ${yamlStr(q.max_label)}`);
        }

        if (q.type === "rating_grid") {
          if (q.min !== "" && q.min !== undefined) lines.push(`              min: ${q.min}`);
          if (q.max !== "" && q.max !== undefined) lines.push(`              max: ${q.max}`);
          if (q.min_label) lines.push(`              min_label: ${yamlStr(q.min_label)}`);
          if (q.max_label) lines.push(`              max_label: ${yamlStr(q.max_label)}`);
        }

        if (OPTION_TYPES.has(q.type)) {
          lines.push(`              options:`);
          q.options.forEach(o => {
            lines.push(`                - value: ${yamlStr(String(o.value))}`);
            lines.push(`                  text: ${yamlStr(o.text)}`);
            if (o.display_if) lines.push(...indentLines(conditionYAML(o.display_if), "                  "));
          });
        }

        if (HAS_COLS.has(q.type)) {
          lines.push(`              columns:`);
          q.columns.forEach(c => {
            lines.push(`                - value: ${yamlStr(String(c.value))}`);
            lines.push(`                  text: ${yamlStr(c.text)}`);
          });
        }

        if (HAS_ROWS.has(q.type)) {
          lines.push(`              rows:`);
          q.rows.forEach(r => {
            lines.push(`                - id: ${r.id}`);
            if (q.type === "checkbox_grid") lines.push(`                  label_prefix: ${r.label_prefix}`);
            else lines.push(`                  label: ${r.label}`);
            lines.push(`                  text: ${yamlStr(r.text)}`);
            if (r.display_if) lines.push(...indentLines(conditionYAML(r.display_if), "                  "));
          });
        }
      });
    });
  });

  return lines.join("\n") + "\n";
}

function conditionYAML(cond) {
  if (!cond) return [];
  const lines = ["display_if:"];
  lines.push(...condNodeYAML(cond, "  "));
  return lines;
}

function condNodeYAML(node, indent) {
  if (node.operator === "and" || node.operator === "or" || node.operator === "not") {
    const lines = [`${indent}operator: ${node.operator}`, `${indent}conditions:`];
    node.conditions.forEach(c => {
      // Serialize the child at the content indent level (indent + 4 spaces,
      // to sit inside the "- " sequence item which occupies 2 of those).
      const contentIndent = indent + "    ";
      const childLines = condNodeYAML(c, contentIndent);
      // First line gets the "- " prefix replacing the first 2 chars of indent
      lines.push(`${indent}  - ${childLines[0].slice(contentIndent.length)}`);
      // Remaining lines keep their full indentation as-is
      childLines.slice(1).forEach(l => lines.push(l));
    });
    return lines;
  }
  const lines = [
    `${indent}question: ${node.question}`,
    `${indent}operator: ${node.operator}`,
  ];
  if (node.value !== undefined && node.value !== null && node.value !== "" &&
      node.operator !== "is_answered" && node.operator !== "is_not_answered") {
    lines.push(`${indent}value: ${yamlStr(String(node.value))}`);
  }
  return lines;
}

function indentLines(lines, prefix) {
  return lines.map((l, i) => i === 0 ? `${prefix}${l}` : `${prefix}${l}`);
}

// YAML boolean aliases (any case) that must be quoted to survive PyYAML round-trip
const YAML_BOOL_ALIASES = new Set([
  "yes","no","true","false","on","off",
  "Yes","No","True","False","On","Off",
  "YES","NO","TRUE","FALSE","ON","OFF",
]);

function yamlStr(s) {
  if (s === null || s === undefined || s === "") return '""';
  const str = String(s);
  // Multi-line: use literal block scalar
  if (str.includes("\n")) return null; // signal to caller to use block scalar
  // Quote YAML boolean aliases, numbers-as-strings, and strings with special chars
  if (YAML_BOOL_ALIASES.has(str) ||
      /^-?\d+(\.\d+)?$/.test(str) ||
      /[:#\[\]{},&*?|\-<>=!%@`'"\\]/.test(str) ||
      /^\s|\s$/.test(str)) {
    return `"${str.replace(/\\/g,"\\\\").replace(/"/g,'\\"')}"`;
  }
  return str;
}

// Like yamlStr but for block-level fields that can span lines (description, notes).
// Returns an array of lines to push rather than a single inline value.
function yamlBlock(key, s, indent) {
  if (!s) return [];
  const str = String(s);
  if (str.includes("\n")) {
    const lines = [`${indent}${key}: |`];
    str.split("\n").forEach(l => lines.push(`${indent}  ${l}`));
    return lines;
  }
  const inline = yamlStr(str);
  return [`${indent}${key}: ${inline}`];
}

// ---------------------------------------------------------------------------
// YAML import
// ---------------------------------------------------------------------------

function importYAML(text) {
  try {
    const parsed = parseYAML(text);
    if (!parsed || !parsed.survey) throw new Error("Missing top-level 'survey' key");
    const s = parsed.survey;
    state.title       = s.title || "Untitled Survey";
    state.description = s.description || "";

    if (s.page_groups) {
      state.page_groups = (s.page_groups || []).map(importGroup);
    } else if (s.pages) {
      // Legacy format: wrap all pages in a single default group
      state.page_groups = [{
        id: uid("group"),
        title: "All Pages",
        display_if: null,
        _open: true,
        pages: (s.pages || []).map(importPage),
      }];
    } else {
      state.page_groups = [];
    }

    selected = { type: null, groupId: null, pageId: null, questionId: null };
    document.getElementById("survey-title-input").value = state.title;
    renderSidebar();
    renderEditor();
    showToast("Survey imported");
  } catch(e) {
    showToast("Import failed: " + e.message, true);
  }
}

function importGroup(g) {
  return {
    id:         g.id || uid("group"),
    title:      g.title || "Untitled Group",
    display_if: g.display_if || null,
    _open:      true,
    pages:      (g.pages || []).map(importPage),
  };
}

function importPage(p) {
  return {
    id:            p.id || uid("page"),
    title:         p.title || "",
    description:   p.description || "",
    builder_notes: p.builder_notes || "",
    display_if:    p.display_if || null,
    page_type:     p.page_type || "standard",
    breakout_button_label:  p.breakout_button_label || "End survey",
    continue_button_label:  p.continue_button_label || "Continue",
    acknowledge_text:       p.acknowledge_text || "",
    _open:         true,
    questions:     (p.questions || []).map(importQuestion),
  };
}

function importQuestion(q) {
  const out = {
    id:         q.id || uid("q"),
    type:       q.type,
    text:       q.text || "",
    label:      q.label || "",
    required:   !!q.required,
    disabled:   !!q.disabled,
    layout:     q.layout || null,
    notes:      q.notes || null,
    note_title: q.note_title !== undefined ? q.note_title : "Note",
    note_position: q.note_position || "side",
    warn_if_empty: q.warn_if_empty !== undefined ? q.warn_if_empty : null,
    display_if: q.display_if || null,
  };
  if (q.options)     out.options  = q.options.map(o => ({ id: uid("opt"), value: o.value !== undefined ? String(o.value) : "", text: o.text||"", display_if: o.display_if||null }));
  if (q.rows)        out.rows     = q.rows.map(r => ({ id: r.id||uid("row"), text: r.text||"", label: r.label||"", label_prefix: r.label_prefix||"", display_if: r.display_if||null }));
  if (q.columns)     out.columns  = q.columns.map(c => ({ id: uid("col"), value: c.value !== undefined ? String(c.value) : "", text: c.text||"" }));
  if (q.min !== undefined) out.min = q.min;
  if (q.max !== undefined) out.max = q.max;
  if (q.integer_only !== undefined) out.integer_only = q.integer_only;
  if (q.default_value !== undefined) out.default_value = q.default_value;
  if (q.min_label !== undefined) out.min_label = q.min_label;
  if (q.max_label !== undefined) out.max_label = q.max_label;
  if (q.defines_variable) {
    out.defines_variable = {
      name: q.defines_variable.name || "",
      mapping: q.defines_variable.mapping || null,
    };
  } else {
    out.defines_variable = null;
  }
  return out;
}

// ---------------------------------------------------------------------------
// Minimal YAML parser (subset — handles our own output format)
// ---------------------------------------------------------------------------

function parseYAML(text) {
  // We need to parse the YAML we produce. Since we control the format,
  // we can use a structured approach: convert to JSON-like structure.
  // This handles: mappings, sequences, quoted strings, booleans, numbers.
  const lines = text.split("\n");
  const root = {};
  parseYAMLBlock(lines, 0, root);
  return root;
}

function parseYAMLBlock(lines, baseIndent, out) {
  let i = 0;

  const getIndent = (line) => {
    if (!line.trim() || line.trim().startsWith("#")) return -1;
    return line.match(/^(\s*)/)[1].length;
  };

  const parseValue = (val) => {
    const v = val.trim();
    if (v === "true")  return true;
    if (v === "false") return false;
    if (v === "null" || v === "~" || v === "") return null;
    if (/^-?\d+(\.\d+)?$/.test(v)) return Number(v);
    if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
      return v.slice(1,-1).replace(/\\"/g,'"').replace(/\\\\/g,'\\');
    }
    return v;
  };

  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith("#")) { i++; continue; }

    const indent = getIndent(line);
    if (indent < baseIndent) break;
    if (indent > baseIndent) { i++; continue; }

    // Sequence item
    if (trimmed.startsWith("- ") || trimmed === "-") {
      const rest = trimmed.slice(2).trim();
      if (!Array.isArray(out)) {
        // shouldn't happen in well-formed YAML
        i++; continue;
      }
      if (!rest) {
        // Block sequence item
        const obj = {};
        i++;
        const subLines = [];
        while (i < lines.length) {
          const subLine = lines[i];
          const subInd  = getIndent(subLine);
          if (subInd === -1) { subLines.push(subLine); i++; continue; }
          if (subInd <= indent) break;
          subLines.push(subLine);
          i++;
        }
        parseYAMLBlock(subLines, indent + 2, obj);
        out.push(obj);
        continue;
      }
      // Inline key: value after "-"
      if (rest.includes(": ") || rest.endsWith(":")) {
        const obj = {};
        const [k, ...vParts] = rest.split(": ");
        const v = vParts.join(": ");
        if (v) obj[k] = parseValue(v);
        else   obj[k] = null;
        // Check for continuation lines
        i++;
        const subLines = [" ".repeat(indent + 2) + rest];
        while (i < lines.length) {
          const subLine = lines[i];
          const subInd  = getIndent(subLine);
          if (subInd === -1) { subLines.push(subLine); i++; continue; }
          if (subInd <= indent) break;
          subLines.push(subLine);
          i++;
        }
        parseYAMLBlock(subLines.slice(1), indent + 2, obj);
        out.push(obj);
        continue;
      }
      out.push(parseValue(rest));
      i++;
      continue;
    }

    // Key: value mapping
    const colonIdx = trimmed.indexOf(": ");
    const colonEnd = trimmed.endsWith(":");
    if (colonIdx !== -1 || colonEnd) {
      const key = colonEnd ? trimmed.slice(0,-1) : trimmed.slice(0, colonIdx);
      const rawVal = colonEnd ? "" : trimmed.slice(colonIdx + 2);

      // Peek ahead for block value
      const nextLines = [];
      let j = i + 1;
      while (j < lines.length) {
        const nl = lines[j];
        const ni = getIndent(nl);
        if (ni === -1) { nextLines.push(nl); j++; continue; }
        if (ni <= indent) break;
        nextLines.push(nl);
        j++;
      }

      if (!rawVal && nextLines.length > 0) {
        const childIndent = getIndent(nextLines.find(l => getIndent(l) !== -1) || "");
        // Is next block a sequence?
        const firstNonEmpty = nextLines.find(l => l.trim() && !l.trim().startsWith("#"));
        if (firstNonEmpty && firstNonEmpty.trim().startsWith("- ")) {
          const arr = [];
          parseYAMLBlock(nextLines, childIndent, arr);
          out[key] = arr;
        } else {
          const obj = {};
          parseYAMLBlock(nextLines, childIndent, obj);
          out[key] = obj;
        }
        i = j;
        continue;
      }

      // Block scalar: literal (|) or folded (>)
      if (rawVal === "|" || rawVal === ">") {
        const scalarLines = [];
        let j2 = i + 1;
        let scalarIndent = -1;
        while (j2 < lines.length) {
          const sl = lines[j2];
          const si = getIndent(sl);
          if (si === -1) { scalarLines.push(""); j2++; continue; }
          if (scalarIndent === -1) scalarIndent = si;
          if (si < scalarIndent) break;
          scalarLines.push(sl.slice(scalarIndent));
          j2++;
        }
        // Strip trailing empty lines, then join
        while (scalarLines.length && scalarLines[scalarLines.length - 1] === "") scalarLines.pop();
        out[key] = rawVal === ">" ? scalarLines.join(" ") : scalarLines.join("\n");
        i = j2;
        continue;
      }

      out[key] = parseValue(rawVal);
      i++;
      continue;
    }

    i++;
  }
}

// ---------------------------------------------------------------------------
// Modal helpers
// ---------------------------------------------------------------------------

function openModal(id)  { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

// ---------------------------------------------------------------------------
// Toast
// ---------------------------------------------------------------------------

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isError ? " error" : "");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// ---------------------------------------------------------------------------
// Utility
// ---------------------------------------------------------------------------

function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ---------------------------------------------------------------------------
// Wiring
// ---------------------------------------------------------------------------

document.getElementById("btn-add-group").addEventListener("click", addGroup);
document.getElementById("btn-add-page").addEventListener("click", addPage);
document.getElementById("btn-export").addEventListener("click", exportYAML);

document.getElementById("survey-title-input").addEventListener("input", (e) => {
  state.title = e.target.value;
});

document.getElementById("btn-description").addEventListener("click", () => {
  document.getElementById("survey-description-input").value = state.description;
  openModal("modal-description");
  // Restore modal to description mode (it gets reused for option/row conditions)
  document.querySelector("#modal-description h3").textContent = "Survey description";
  const body = document.querySelector("#modal-description .field-group");
  body.innerHTML = "";
  const lbl = document.createElement("label");
  lbl.className = "field-label";
  lbl.textContent = "Description";
  const ta = document.createElement("textarea");
  ta.className = "field-input";
  ta.id = "survey-description-input";
  ta.rows = 4;
  ta.placeholder = "Optional intro text…";
  ta.value = state.description;
  body.appendChild(lbl);
  body.appendChild(ta);
  document.querySelector("#modal-description .modal-actions").innerHTML =
    `<button class="btn btn-primary" id="modal-desc-save">Save</button>`;
  document.getElementById("modal-desc-save").onclick = () => {
    state.description = document.getElementById("survey-description-input").value;
    closeModal("modal-description");
  };
});

document.getElementById("btn-import").addEventListener("click", () => {
  document.getElementById("file-import").click();
});

document.getElementById("file-import").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => importYAML(ev.target.result);
  reader.readAsText(file);
  e.target.value = ""; // reset so same file can be re-imported
});

document.getElementById("modal-type-cancel").addEventListener("click", () => closeModal("modal-type"));

// Close modals on overlay click
document.querySelectorAll(".modal-overlay").forEach(overlay => {
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

document.getElementById("modal-desc-save").addEventListener("click", () => {
  state.description = document.getElementById("survey-description-input").value;
  closeModal("modal-description");
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

renderSidebar();
renderEditor();

</script>
</body>
</html>
